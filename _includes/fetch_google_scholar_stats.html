<script>
  document.addEventListener("DOMContentLoaded", function () {
    {% if site.google_scholar_stats_use_cdn %}
      const gsDataBaseUrl = "https://cdn.jsdelivr.net/gh/{{ site.repository }}@";
    {% else %}
      const gsDataBaseUrl = "https://raw.githubusercontent.com/{{ site.repository }}/";
    {% endif %}

    fetch(gsDataBaseUrl + "google-scholar-stats/gs_data.json")
      .then(function (response) {
        if (!response.ok) {
          throw new Error("Failed to fetch Google Scholar data.");
        }
        return response.json();
      })
      .then(function (data) {
        const totalCitationElement = document.getElementById("total_cit");
        if (totalCitationElement && data.citedby !== undefined) {
          totalCitationElement.textContent = data.citedby;
        }

        document.querySelectorAll(".show_paper_citations").forEach(function (element) {
          const paperId = element.getAttribute("data");
          const publication = data.publications && data.publications[paperId];

          if (publication && publication.num_citations !== undefined) {
            element.textContent = "| Citations: " + publication.num_citations;
          }
        });
      })
      .catch(function (error) {
        console.warn(error.message);
      });
  });
</script>
